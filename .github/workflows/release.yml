name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:   # allows manual trigger for testing the build

jobs:
  # ── Build executables ────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: murmur-windows-x86_64.exe
            dist_file: dist/murmur.exe

          - os: ubuntu-22.04
            artifact: murmur-linux-x86_64
            dist_file: dist/murmur

    steps:
      - uses: actions/checkout@v4

      # ── Linux system dependencies ───────────────────────────────────────────
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            python3-tk \
            portaudio19-dev \
            libportaudio2 \
            libayatana-appindicator3-1

      # ── Python + uv ────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        working-directory: murmur
        run: uv python install 3.11

      - name: Install dependencies
        working-directory: murmur
        run: uv sync

      - name: Install PyInstaller
        working-directory: murmur
        run: uv pip install pyinstaller

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build executable
        working-directory: murmur
        run: uv run pyinstaller murmur.spec --noconfirm

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item murmur\dist\murmur.exe ${{ matrix.artifact }}
        shell: pwsh

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: mv murmur/dist/murmur murmur/dist/${{ matrix.artifact }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: murmur/dist/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish a real release on tag pushes, not manual dispatches
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Installation

            | Platform | File |
            |---|---|
            | Windows 10/11 (x86-64) | `murmur-windows-x86_64.exe` |
            | Linux (x86-64, glibc ≥ 2.35) | `murmur-linux-x86_64` |

            ### Windows
            Download `murmur-windows-x86_64.exe` and run it from a terminal.
            On first run Whisper will download the model (~150 MB) to `~/.cache/huggingface/`.

            ### Linux
            ```bash
            chmod +x murmur-linux-x86_64
            ./murmur-linux-x86_64
            ```
            Requires `libportaudio2` and (for the GUI overlay) `python3-tk` and `libayatana-appindicator3-1`.

            ### CUDA
            CUDA is **not** bundled. Install `nvidia-cublas-cu12 nvidia-cudnn-cu12 nvidia-cuda-runtime-cu12`
            via pip and set `device = "cuda"` in `~/.config/murmur/config.toml`.

            ### Wake word (optional)
            ```bash
            pip install openwakeword
            ```
            Then add `wake_word = "hey_jarvis"` to your config.
