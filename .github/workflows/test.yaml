name: Test
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-murmur:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y libportaudio2
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.11
        working-directory: murmur
      - name: Install wxPython (Linux — no wheel on PyPI, use extras server)
        working-directory: murmur
        run: |
          uv venv
          uv pip install https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-22.04/wxpython-4.2.5-cp311-cp311-linux_x86_64.whl
          uv pip install ".[test]"
      - run: uv run --no-sync ruff check .
        working-directory: murmur
      - run: uv run --no-sync ruff format --check .
        working-directory: murmur
      - run: uv run --no-sync pytest
        working-directory: murmur
