name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:   # allows manual trigger for testing the build

jobs:
  # ── Build executables ────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: murmur-windows-x86_64.exe
            dist_file: dist/murmur.exe

          - os: ubuntu-22.04
            artifact: murmur-linux-x86_64
            dist_file: dist/murmur

          - os: macos-latest
            artifact: murmur-macos-arm64
            dist_file: dist/murmur

          - os: macos-13
            artifact: murmur-macos-x86_64
            dist_file: dist/murmur

    steps:
      - uses: actions/checkout@v4

      # ── System dependencies ─────────────────────────────────────────────────
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            python3-tk \
            portaudio19-dev \
            libportaudio2 \
            libayatana-appindicator3-1

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install portaudio

      # ── Python + uv ────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        working-directory: murmur
        run: uv python install 3.11

      - name: Install dependencies
        working-directory: murmur
        run: uv sync

      - name: Install PyInstaller
        working-directory: murmur
        run: uv pip install pyinstaller

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build executable
        working-directory: murmur
        run: uv run pyinstaller murmur.spec --noconfirm

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item murmur\dist\murmur.exe ${{ matrix.artifact }}
        shell: pwsh

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv murmur/dist/murmur murmur/dist/${{ matrix.artifact }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: murmur/dist/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish a real release on tag pushes, not manual dispatches
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --notes "## Installation

          | Platform | File |
          |---|---|
          | Windows 10/11 (x86-64) | \`murmur-windows-x86_64.exe\` |
          | Linux (x86-64, glibc ≥ 2.35) | \`murmur-linux-x86_64\` |
          | macOS (Apple Silicon) | \`murmur-macos-arm64\` |
          | macOS (Intel) | \`murmur-macos-x86_64\` |

          ### Linux / macOS
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
          \`\`\`

          ### Windows (PowerShell)
          \`\`\`powershell
          irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
          \`\`\`

          ### Manual (Linux)
          \`\`\`bash
          chmod +x murmur-linux-x86_64
          ./murmur-linux-x86_64
          \`\`\`
          Requires \`libportaudio2\` and (for the GUI overlay) \`python3-tk\` and \`libayatana-appindicator3-1\`.

          ### Manual (macOS)
          \`\`\`bash
          chmod +x murmur-macos-arm64   # or murmur-macos-x86_64 on Intel
          ./murmur-macos-arm64
          \`\`\`
          Requires \`portaudio\` (\`brew install portaudio\`).

          ### CUDA
          CUDA is **not** bundled. Install \`nvidia-cublas-cu12 nvidia-cudnn-cu12 nvidia-cuda-runtime-cu12\`
          via pip and set \`device = \"cuda\"\` in \`~/.config/murmur/config.toml\`.

          ### Wake word (optional)
          \`\`\`bash
          murmur --install-wakeword
          \`\`\`
          Then add \`wake_word = \"hey_jarvis\"\` to your config." \
            || true
          gh release upload "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --clobber \
            artifacts/*
